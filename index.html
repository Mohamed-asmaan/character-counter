<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <h1>Message</h1>
    <p>200 characters max</p>
    <textarea id="message" name="message" rows="5" placeholder="Type your message here..." maxlength="200"></textarea>
    <p><span id="counter">0/200 characters</span></p>
    <p id="warning"></p>
  </main>





  <script src="script.js"></script>
</body>

</html>
